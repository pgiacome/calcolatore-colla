<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8"/>
    <link rel="icon" href="./favicon.ico"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <meta name="theme-color" content="#213b8f"/>
    <meta name="Color Matcher" content="Tenax Color Matcher"/>
    <link rel="apple-touch-icon" href="./logo512.png"/>
    <link rel="manifest" href="./manifest.json"/>
    <title>Tenax Color Matcher - Calcolatore Colla</title>
    
    <script defer="defer" src="./static/js/main.2ddddf72.js"></script>
    <link href="./static/css/main.4e2af227.css" rel="stylesheet">

    <style>
        :root {
            --tenax-blue: #213b8f;
            --tenax-white: #ffffff;
            --tenax-text-dark: #1a1a1a;
            --tenax-border: #cccccc;
            --tenax-bg-light: #f8f9fa; /* Grigio chiarissimo di contrasto per il box */
        }

        body {
            background-color: var(--tenax-white);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .calc-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        .glue-calculator-container {
            background-color: var(--tenax-white);
            border: 1px solid var(--tenax-border);
            border-top: 6px solid var(--tenax-blue);
            padding: 35px 30px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(33, 59, 143, 0.08);
            box-sizing: border-box;
        }

        .glue-calculator-container h2 {
            color: var(--tenax-blue);
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 22px;
            border-bottom: 2px solid var(--tenax-blue);
            padding-bottom: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .calc-form-group {
            margin-bottom: 20px;
        }

        .calc-form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--tenax-text-dark);
            font-size: 14px;
        }

        .calc-form-group input, 
        .calc-form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--tenax-border);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            color: var(--tenax-text-dark);
            background-color: var(--tenax-white);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .calc-form-group input:focus, 
        .calc-form-group select:focus {
            border-color: var(--tenax-blue);
            box-shadow: 0 0 0 3px rgba(33, 59, 143, 0.1);
            outline: none;
        }

        .calc-result-box {
            background-color: var(--tenax-blue);
            color: var(--tenax-white);
            padding: 22px;
            border-radius: 6px;
            text-align: center;
            margin-top: 28px;
            box-shadow: 0 4px 12px rgba(33, 59, 143, 0.2);
        }

        .result-label {
            display: block;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 6px;
            color: var(--tenax-white);
            opacity: 0.9;
        }

        .result-value {
            font-size: 42px;
            font-weight: 700;
            line-height: 1;
            color: var(--tenax-white);
        }

        .result-um {
            font-size: 22px;
            font-weight: 400;
            color: var(--tenax-white);
        }
    </style>
</head>
<body>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="root">
        <div class="calc-wrapper">
            <div class="glue-calculator-container">
                <h2>Calcolo Volumi INTEGRA</h2>
                
                <div class="calc-form-group">
                    <label for="glue-type">Tipologia Incollaggio</label>
                    <select id="glue-type" onchange="updateDefaultThickness()">
                        <option value="fuga-lineare" data-thickness="0.95">Fuga Lineare</option>
                        <option value="mitre-edge" data-thickness="1.05">Mitre Edge</option>
                        <option value="lamination-edge" data-thickness="1.05">Lamination Edge</option>
                    </select>
                </div>

                <div class="calc-form-group">
                    <label for="slab-thickness">Slab Thickness (mm)</label>
                    <input type="number" id="slab-thickness" value="20" min="0" step="any" oninput="calculateGlue()">
                </div>

                <div class="calc-form-group">
                    <label for="seam-length">Seam Length (mm)</label>
                    <input type="number" id="seam-length" value="1000" min="0" step="any" oninput="calculateGlue()">
                </div>

                <div class="calc-form-group">
                    <label for="glue-thickness">Spessore Incollaggio (mm)</label>
                    <input type="number" id="glue-thickness" value="0.95" min="0" step="any" oninput="calculateGlue()">
                </div>

                <div class="calc-result-box">
                    <span class="result-label">Volume di Colla Stimato</span>
                    <div class="result-value"><span id="glue-result">19</span> <span class="result-um">ml</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
    function updateDefaultThickness() {
        var select = document.getElementById('glue-type');
        if (!select) return;
        var selectedOption = select.options[select.selectedIndex];
        var defaultThickness = selectedOption.getAttribute('data-thickness');
        
        var thicknessInput = document.getElementById('glue-thickness');
        if (thicknessInput) {
            thicknessInput.value = defaultThickness;
        }
        calculateGlue();
    }

    function calculateGlue() {
        var slabEl = document.getElementById('slab-thickness');
        var seamEl = document.getElementById('seam-length');
        var glueEl = document.getElementById('glue-thickness');
        var resultEl = document.getElementById('glue-result');
        
        if (!slabEl || !seamEl || !glueEl || !resultEl) return;

        // Gestione del punto/virgola per i decimali
        var slabThickness = parseFloat(slabEl.value.toString().replace(',', '.')) || 0;
        var seamLength = parseFloat(seamEl.value.toString().replace(',', '.')) || 0;
        var glueThickness = parseFloat(glueEl.value.toString().replace(',', '.')) || 0;
        
        // Formula basata sul foglio INTEGRA: (Slab * Seam * Spessore) / 1000
        var volume = (slabThickness * seamLength * glueThickness) / 1000;
        
        // Arrotondamento all'intero più vicino
        resultEl.textContent = Math.round(volume);
    }

    // Calcolo iniziale automatico al caricamento della pagina
    document.addEventListener('DOMContentLoaded', calculateGlue);
    </script>

</body>
</html>
